<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Quiz for Kids</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 English Quiz</h1>
            <p class="subtitle">For Elementary Students</p>
            <div class="score-board">
                <span>Correct: <span id="correct-count">0</span></span>
                <span>Wrong: <span id="wrong-count">0</span></span>
            </div>
        </header>

        <main id="quiz-container">
            <div id="loading" class="loading">
                Loading question...
            </div>

            <div id="quiz-content" class="quiz-content" style="display: none;">
                <div class="category-badge" id="category-badge"></div>
                
                <div class="question-box">
                    <h2 id="question-text"></h2>
                </div>

                <div class="options-container" id="options-container">
                    <!-- 선택지가 여기에 동적으로 추가됩니다 -->
                </div>

                <div id="result-message" class="result-message"></div>

                <button id="next-button" class="btn-next" style="display: none;">
                    Next Question
                </button>
            </div>
        </main>

        <footer>
            <p>Keep learning! 🌟</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
