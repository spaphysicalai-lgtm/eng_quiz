<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초등 2학년 퀴즈</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 초등 2학년 퀴즈</h1>
            <div class="score-board">
                <span>맞힌 문제: <span id="correct-count">0</span></span>
                <span>틀린 문제: <span id="wrong-count">0</span></span>
            </div>
        </header>

        <main id="quiz-container">
            <div id="loading" class="loading">
                문제를 불러오는 중...
            </div>

            <div id="quiz-content" class="quiz-content" style="display: none;">
                <div class="question-box">
                    <h2 id="question-text"></h2>
                </div>

                <div class="options-container" id="options-container">
                    <!-- 선택지가 여기에 동적으로 추가됩니다 -->
                </div>

                <div id="result-message" class="result-message"></div>

                <button id="next-button" class="btn-next" style="display: none;">
                    다음 문제
                </button>
            </div>
        </main>

        <footer>
            <p>즐겁게 공부해요! 🌟</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
